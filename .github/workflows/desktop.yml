name: Desktop

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S desktop -B build/desktop-macos -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/desktop-macos --config Release

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - --entitlements desktop/src/macos/SAGE.entitlements build/desktop-macos/SAGE.app

      - name: Package
        run: cmake --build build/desktop-macos --target package --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: SAGE-macos-dmg
          path: build/desktop-macos/*.dmg

  windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 SDK
        shell: pwsh
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.3351.48 -OutputDirectory desktop\vendor

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixRoot) { throw "WiX Toolset installation was not found." }
          Add-Content $env:GITHUB_PATH (Join-Path $wixRoot.FullName "bin")

      - name: Configure
        shell: pwsh
        run: cmake -S desktop -B build\desktop-windows -G "Visual Studio 17 2022" -A x64 -DWEBVIEW2_ROOT="$PWD\desktop\vendor\Microsoft.Web.WebView2.1.0.3351.48"

      - name: Build
        shell: pwsh
        run: cmake --build build\desktop-windows --config Release

      - name: Package
        shell: pwsh
        run: cmake --build build\desktop-windows --target package --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: SAGE-windows-msi
          path: build/desktop-windows/*.msi
