<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; media-src 'none'; connect-src 'none'; font-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'none'"
    >
    <meta name="theme-color" content="#f7f8fb">
    <title>SAGE - Signature Analysis for Gel-based Experiments</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <script src="src/app.js" defer></script>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand">
          <strong>SAGE</strong>
          <span>Signature Analysis for Gel-based Experiments</span>
        </div>
        <nav class="toolbar" aria-label="Project actions">
          <button id="newProjectBtn" type="button" title="New project">+</button>
          <button id="undoBtn" type="button" title="Undo">↶</button>
          <button id="redoBtn" type="button" title="Redo">↷</button>
          <button id="exportProjectBtn" type="button" title="Export project JSON">⇩</button>
          <label class="icon-upload" title="Import project JSON">
            ⇧
            <input id="projectImportInput" type="file" accept="application/json,.json">
          </label>
        </nav>
        <div class="privacy-chip" title="No network calls or server upload">Local only</div>
      </header>

      <main class="workspace-grid">
        <aside class="sidebar left-panel" aria-label="Controls">
          <section class="panel">
            <h2>Image</h2>
            <label class="file-picker">
              <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp,image/tiff,.tif,.tiff">
              <span>Upload gel image</span>
            </label>
            <div id="imageMeta" class="meta-list">No image loaded</div>
            <div class="row">
              <button id="resetImageBtn" type="button">Reset image</button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h2>Enhance</h2>
              <button id="resetAdjustmentsBtn" type="button" title="Reset enhancements">Reset</button>
            </div>
            <label>Brightness <input id="brightness" type="range" min="-100" max="100" value="0"></label>
            <label>Contrast <input id="contrast" type="range" min="-100" max="100" value="0"></label>
            <label>Gamma <input id="gamma" type="range" min="20" max="300" value="100"></label>
            <label>Saturation <input id="saturation" type="range" min="0" max="250" value="100"></label>
            <label>Sharpen <input id="sharpen" type="range" min="0" max="100" value="0"></label>
            <label>Denoise <input id="denoise" type="range" min="0" max="100" value="0"></label>
            <label>Background <input id="backgroundSubtract" type="range" min="0" max="100" value="0"></label>
            <div class="switch-row">
              <label><input id="grayscale" type="checkbox"> Grayscale</label>
              <label><input id="invert" type="checkbox"> Invert</label>
            </div>
          </section>

          <section class="panel">
            <h2>Reference Overlay</h2>
            <label class="file-picker secondary">
              <input id="overlayImageInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" multiple>
              <span>Import overlay images</span>
            </label>
            <div id="overlayList" class="overlay-list"></div>
            <div class="row">
              <label class="inline-file">
                Import set
                <input id="overlaySetImportInput" type="file" accept="application/json,.json">
              </label>
            </div>
            <label>Opacity <input id="selectedOpacity" type="range" min="0" max="100" value="80"></label>
            <div class="grid-2">
              <label>X <input id="selectedX" type="number" step="1"></label>
              <label>Y <input id="selectedY" type="number" step="1"></label>
              <label>Scale X <input id="selectedScaleX" type="number" step="0.05"></label>
              <label>Scale Y <input id="selectedScaleY" type="number" step="0.05"></label>
              <label>Rotate <input id="selectedRotation" type="number" step="1"></label>
              <label>Skew X <input id="selectedSkewX" type="number" step="1"></label>
            </div>
            <div class="switch-row">
              <label><input id="selectedVisible" type="checkbox" checked disabled> Active</label>
              <label><input id="selectedLocked" type="checkbox"> Locked</label>
            </div>
            <div class="row">
              <button id="bringForwardBtn" type="button">Forward</button>
              <button id="sendBackwardBtn" type="button">Backward</button>
            </div>
          </section>
        </aside>

        <section class="center-stage" aria-label="Canvas workspace">
          <div class="notice">
            SAGE runs locally in your browser. Images and analysis data are not uploaded, backed up, or transmitted. Save or export files manually if you want to keep them.
          </div>
          <div class="canvas-frame">
            <canvas id="workspaceCanvas" width="1200" height="800" aria-label="Image analysis canvas"></canvas>
          </div>
          <div class="statusbar">
            <span id="cursorReadout">x -, y -</span>
            <span id="zoomReadout">100%</span>
            <div class="layer-toggles">
              <label><input id="showProcessed" type="checkbox" checked> Processed</label>
              <label><input id="showAnnotations" type="checkbox" checked> Annotations</label>
              <label><input id="showOverlays" type="checkbox" checked> Overlays</label>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
